<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SocialBot — Overlay effetti</title>
  <style>
    /* Sfondo TRASPARENTE: in OBS si vede solo l'effetto, non la pagina. */
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    /* Il "palco": area centrale dove compaiono immagini e video. */
    #palco {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .effetto {
      max-width: 80vw;
      max-height: 80vh;
      opacity: 0;
      transform: scale(.9);
      transition: opacity .28s ease, transform .28s ease;
      filter: drop-shadow(0 10px 40px rgba(0, 0, 0, .55));
      border-radius: 8px;
    }
    .effetto.dentro { opacity: 1; transform: scale(1); }

    /* Etichetta con il nome del comando (usata soprattutto per gli audio). */
    #etichette {
      position: fixed;
      left: 0; right: 0; bottom: 7vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .5rem;
      pointer-events: none;
    }
    .pillola {
      background: rgba(145, 70, 255, .85);
      color: #fff;
      font-weight: 800;
      font-size: 1.6rem;
      letter-spacing: .02em;
      padding: .4rem 1.1rem;
      border-radius: 999px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, .5);
      box-shadow: 0 8px 30px rgba(0, 0, 0, .45);
      opacity: 0;
      transform: translateY(12px);
      transition: opacity .25s ease, transform .25s ease;
    }
    .pillola.dentro { opacity: 1; transform: translateY(0); }

    /* Testo a schermo (azione "overlayTesto" dei Moduli): centrato, con fade. */
    #testi {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      padding: 0 6vw;
    }
    .testo-overlay {
      max-width: 84vw;
      text-align: center;
      color: #fff;
      font-weight: 800;
      font-size: 3.2rem;
      line-height: 1.15;
      letter-spacing: .01em;
      text-shadow: 0 3px 18px rgba(0, 0, 0, .7), 0 0 2px rgba(0, 0, 0, .9);
      opacity: 0;
      transform: translateY(14px) scale(.98);
      transition: opacity .3s ease, transform .3s ease;
      word-break: break-word;
    }
    .testo-overlay.dentro { opacity: 1; transform: translateY(0) scale(1); }
  </style>
</head>
<body>
  <div id="palco"></div>
  <div id="etichette"></div>
  <div id="testi"></div>

  <script>
    'use strict';

    // --- ricava login e chiave dalla URL corrente -----------------------
    // percorso atteso: /overlay/<login>   ·   query: ?key=...
    const parti = location.pathname.split('/').filter(Boolean); // ['overlay', '<login>']
    const login = parti[1] || '';
    const urlStream = '/overlay/' + encodeURIComponent(login) + '/stream' + location.search;

    const palco = document.getElementById('palco');
    const etichette = document.getElementById('etichette');
    const testi = document.getElementById('testi');

    // --- coda per gli effetti VISIVI (immagini/video): uno alla volta -----
    const codaVisiva = [];
    let occupato = false;

    function mostraProssimo() {
      if (occupato || !codaVisiva.length) return;
      occupato = true;
      const ev = codaVisiva.shift();
      if (ev.tipo === 'immagine') mostraImmagine(ev);
      else if (ev.tipo === 'video') mostraVideo(ev);
      else finito();
    }

    function finito() {
      occupato = false;
      // piccola pausa tra un effetto e l'altro
      setTimeout(mostraProssimo, 120);
    }

    function durataMs(ev, fallback) {
      const n = Number(ev.durata);
      return Number.isFinite(n) && n > 0 ? n : fallback;
    }

    function volume01(ev) {
      const n = Number(ev.volume);
      const v = Number.isFinite(n) ? n : 100;
      return Math.min(1, Math.max(0, v / 100));
    }

    function mostraImmagine(ev) {
      const img = document.createElement('img');
      img.className = 'effetto';
      img.src = ev.url;
      palco.appendChild(img);
      requestAnimationFrame(() => img.classList.add('dentro'));
      etichettaVolatile(ev.comando, durataMs(ev, 5000));
      setTimeout(() => {
        img.classList.remove('dentro');
        setTimeout(() => { img.remove(); finito(); }, 320);
      }, durataMs(ev, 5000));
    }

    function mostraVideo(ev) {
      const v = document.createElement('video');
      v.className = 'effetto';
      v.src = ev.url;
      v.autoplay = true;
      v.playsInline = true;
      v.volume = volume01(ev);
      palco.appendChild(v);
      requestAnimationFrame(() => v.classList.add('dentro'));
      etichettaVolatile(ev.comando, 1800);

      let chiuso = false;
      const chiudi = () => {
        if (chiuso) return;
        chiuso = true;
        v.classList.remove('dentro');
        setTimeout(() => { try { v.pause(); } catch (e) {} v.remove(); finito(); }, 320);
      };
      v.addEventListener('ended', chiudi);
      v.addEventListener('error', chiudi);
      v.play().catch(() => {});
      // rete di sicurezza: chiudi comunque dopo la durata indicata
      setTimeout(chiudi, durataMs(ev, 8000) + 600);
    }

    // Gli audio possono sovrapporsi: li suoniamo subito, senza coda.
    function suona(ev) {
      try {
        const a = new Audio(ev.url);
        a.volume = volume01(ev);
        a.play().catch(() => {});
      } catch (e) { /* audio non riproducibile: pazienza */ }
      etichettaVolatile(ev.comando, 1600);
    }

    // Mostra un testo libero al centro dello schermo per `durata` ms, con fade.
    // Usato dall'azione "overlayTesto" dei Moduli (payload { tipo:'testo', testo, durata }).
    function mostraTesto(ev) {
      const t = String(ev.testo || '').slice(0, 400);
      if (!t) return;
      const durata = durataMs(ev, 5000);
      const el = document.createElement('div');
      el.className = 'testo-overlay';
      el.textContent = t;                     // textContent: niente HTML, niente injection
      testi.appendChild(el);
      requestAnimationFrame(() => el.classList.add('dentro'));
      setTimeout(() => {
        el.classList.remove('dentro');
        setTimeout(() => el.remove(), 320);
      }, durata);
    }

    // Mostra il nome del comando in una pillola che compare e sfuma.
    function etichettaVolatile(comando, durata) {
      if (!comando) return;
      const el = document.createElement('div');
      el.className = 'pillola';
      el.textContent = '!' + comando;
      etichette.appendChild(el);
      requestAnimationFrame(() => el.classList.add('dentro'));
      setTimeout(() => {
        el.classList.remove('dentro');
        setTimeout(() => el.remove(), 300);
      }, Math.max(800, durata));
    }

    // --- connessione SSE (riconnessione automatica nativa) ---------------
    function connetti() {
      const es = new EventSource(urlStream);
      es.onmessage = (m) => {
        let dati;
        try { dati = JSON.parse(m.data); } catch (e) { return; }
        if (!dati || !dati.tipo) return;
        if (dati.tipo === 'audio') suona(dati);
        else if (dati.tipo === 'testo') mostraTesto(dati);
        else { codaVisiva.push(dati); mostraProssimo(); }
      };
      // in caso di errore EventSource riprova da solo: non facciamo nulla
      es.onerror = () => {};
    }

    if (login) connetti();
  </script>
</body>
</html>
