  <div id="cookie-banner" class="cookie-banner" hidden>

    <button type="button" id="cookie-ok" class="btn">Ho capito</button>
  </div>
  <script>
    (function () {
      try {
        if (localStorage.getItem('cookie-ok') === '1') return;
        var b = document.getElementById('cookie-banner'); if (!b) return;
        b.hidden = false;
        document.getElementById('cookie-ok').addEventListener('click', function () {
          try { localStorage.setItem('cookie-ok', '1'); } catch (e) { /* niente */ }
          b.hidden = true;
        });
      } catch (e) { /* niente */ }
    })();
  </script>
