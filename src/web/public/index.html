<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ffffff">
  <title>SocialBot — la dashboard del tuo bot</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="icon" href="/icons/icon-192.png">
</head>
<body>

  <!-- notifiche a scomparsa -->
  <div id="toast-box" aria-live="polite"></div>

  <!-- barra superiore: visibile solo su mobile (apre la sidebar) -->
  <header class="barra-mobile">
    <button class="apri-menu" id="apri-menu" aria-label="Apri il menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <span class="marchio-mobile">SocialBot</span>
  </header>

  <div class="guscio">
    <!-- sidebar: logo, navigazione (riempita da app.js) e utente -->
    <aside class="barra-laterale" id="barra-laterale" aria-label="Navigazione">
      <a class="marchio" href="/">
        <span class="marchio-segno" aria-hidden="true">S</span>
        <span class="marchio-testo">SocialBot<small>andryxify.it</small></span>
      </a>
      <nav class="nav-lat" id="nav-lat"></nav>
      <div class="utente-lat" id="area-utente"></div>
    </aside>

    <div class="backdrop" id="backdrop"></div>

    <main class="area-principale">
      <div id="app" class="contenitore">
        <div class="caricamento">Caricamento…</div>
      </div>
      <footer class="pie">
        <p>SocialBot parla nella tua chat <strong>con il tuo account</strong> — sei sempre tu ad avere il controllo.</p>
        <p class="pie-legale"><a href="/privacy">Privacy &amp; Sicurezza</a></p>
      </footer>
    </main>
  </div>

  <!-- banner cookie (solo informativo: usiamo un unico cookie tecnico) -->
  <div id="cookie-banner" class="cookie-banner" hidden>
    <p>Usiamo solo un <strong>cookie tecnico</strong> per tenerti connesso dopo l'accesso.
      Nessun tracciamento, nessuna pubblicità. <a href="/privacy">Dettagli</a></p>
    <button type="button" id="cookie-ok" class="btn">Ho capito</button>
  </div>
  <script>
    (function () {
      try {
        if (localStorage.getItem('cookie-ok') === '1') return;
        var b = document.getElementById('cookie-banner'); if (!b) return;
        b.hidden = false;
        document.getElementById('cookie-ok').addEventListener('click', function () {
          try { localStorage.setItem('cookie-ok', '1'); } catch (e) { /* niente */ }
          b.hidden = true;
        });
      } catch (e) { /* niente */ }
    })();
  </script>

  <script src="app.js"></script>
</body>
</html>
