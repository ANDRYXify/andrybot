<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#7c3aed">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>SocialBot — Sblocca</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(120% 120% at 50% 0%, #2a1a4f 0%, #1a1030 60%, #120a24 100%);
      color: #ece8ff; padding: 24px;
    }
    .card {
      width: 100%; max-width: 380px; text-align: center;
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px; padding: 32px 26px; backdrop-filter: blur(6px);
    }
    img { width: 84px; height: 84px; border-radius: 20px; }
    h1 { font-size: 1.35rem; margin: 18px 0 6px; }
    p { color: #b9b2d9; font-size: .95rem; line-height: 1.45; margin: 6px 0; }
    button {
      width: 100%; margin-top: 22px; padding: 14px 18px; border: 0; cursor: pointer;
      border-radius: 12px; font-size: 1rem; font-weight: 600; color: #fff;
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
    }
    button:disabled { opacity: .6; cursor: default; }
    .msg { margin-top: 14px; font-size: .9rem; min-height: 1.2em; }
    .msg.err { color: #ff9d9d; }
    .msg.ok { color: #9dffc0; }
    a { color: #c4b5fd; font-size: .88rem; display: inline-block; margin-top: 18px; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/icons/icon-192.png" alt="SocialBot">
    <h1>Bentornato 👋</h1>
    <p>Sblocca la tua dashboard con la <strong>passkey</strong> (impronta, volto o PIN del dispositivo).</p>
    <button id="btn">🔓 Sblocca con passkey</button>
    <div class="msg" id="msg"></div>
    <a href="https://www.andryxify.it">Non hai una passkey? Entra dal sito</a>
    <div style="margin-top:10px"><a href="/privacy" style="font-size:.82rem;color:#8b83ad">Privacy &amp; Sicurezza</a></div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const b64urlToBuf = (s) => {
      s = s.replace(/-/g, '+').replace(/_/g, '/');
      const bin = atob(s + '==='.slice((s.length + 3) % 4));
      const u = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) u[i] = bin.charCodeAt(i);
      return u.buffer;
    };
    const bufToB64url = (buf) => {
      let bin = ''; const u = new Uint8Array(buf);
      for (let i = 0; i < u.length; i++) bin += String.fromCharCode(u[i]);
      return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    };
    const post = async (url, body) => {
      const r = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body || {}) });
      const d = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(d.errore || ('errore ' + r.status));
      return d;
    };

    // auto = tentativo automatico all'avvio dell'app: se serve un tap o viene
    // annullato, resta il bottone senza mostrare errori "spaventosi".
    async function sblocca(auto) {
      const msg = $('msg'); const btn = $('btn');
      msg.className = 'msg'; msg.textContent = '';
      if (!window.PublicKeyCredential) { if (!auto) { msg.className = 'msg err'; msg.textContent = 'Questo dispositivo non supporta le passkey.'; } return; }
      btn.disabled = true;
      try {
        const opt = await post('/api/passkey/login/inizio');
        const cred = await navigator.credentials.get({ publicKey: {
          challenge: b64urlToBuf(opt.challenge),
          rpId: opt.rpId,
          allowCredentials: [],
          userVerification: opt.userVerification || 'preferred',
          timeout: opt.timeout || 60000,
        } });
        await post('/api/passkey/login/fine', {
          id: cred.id,
          authenticatorData: bufToB64url(cred.response.authenticatorData),
          clientDataJSON: bufToB64url(cred.response.clientDataJSON),
          signature: bufToB64url(cred.response.signature),
        });
        msg.className = 'msg ok'; msg.textContent = 'Sbloccato! ✨';
        location.href = '/';
      } catch (e) {
        btn.disabled = false;
        if (auto) return;   // avvio automatico non riuscito: si aspetta il tap, in silenzio
        msg.className = 'msg err';
        msg.textContent = (e && e.name === 'NotAllowedError') ? 'Operazione annullata.' : ('Non riuscito: ' + (e.message || e));
      }
    }
    $('btn').addEventListener('click', () => sblocca(false));

    // App installata (standalone): apri SUBITO lo sblocco con passkey.
    const inApp = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone === true;
    if (inApp) window.addEventListener('load', () => setTimeout(() => sblocca(true), 250));
  </script>
</body>
</html>
