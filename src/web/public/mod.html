<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#7c3aed">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>SocialBot — Accesso moderatore</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(120% 120% at 50% 0%, #2a1a4f 0%, #1a1030 60%, #120a24 100%);
      color: #ece8ff; padding: 24px;
    }
    .card {
      width: 100%; max-width: 400px; text-align: center;
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px; padding: 32px 26px; backdrop-filter: blur(6px);
    }
    img { width: 76px; height: 76px; border-radius: 18px; }
    h1 { font-size: 1.35rem; margin: 16px 0 6px; }
    p { color: #b9b2d9; font-size: .95rem; line-height: 1.5; margin: 8px 0; }
    .twitch {
      width: 100%; margin-top: 22px; padding: 14px 18px; border: 0; cursor: pointer;
      border-radius: 12px; font-size: 1rem; font-weight: 600; color: #fff; text-decoration: none;
      display: inline-block; background: #9146FF;
    }
    .msg { margin-top: 14px; font-size: .9rem; min-height: 1.1em; }
    .msg.err { color: #ff9d9d; }
    a.piccolo { color: #8b83ad; font-size: .84rem; display: inline-block; margin-top: 16px; }
    code { background: rgba(255,255,255,.08); padding: 1px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/icons/icon-192.png" alt="SocialBot">
    <h1>Sei stato invitato 🤝</h1>
    <p id="intro">Accedi con Twitch per gestire il bot del canale come <strong>moderatore</strong>.
      Confermiamo solo chi sei: nessuna password, nessun permesso in più.</p>
    <a class="twitch" id="btn" href="#">Accedi con Twitch</a>
    <div class="msg" id="msg"></div>
    <a class="piccolo" href="/privacy">Privacy &amp; Sicurezza</a>
  </div>

  <script>
    (function () {
      var q = new URLSearchParams(location.search);
      var invito = q.get('invito');
      var errore = q.get('errore');
      var btn = document.getElementById('btn');
      btn.href = '/auth/mod' + (invito ? ('?invito=' + encodeURIComponent(invito)) : '');
      if (!invito) {
        document.getElementById('intro').innerHTML =
          'Accedi con Twitch per gestire i canali di cui sei <strong>moderatore</strong>. ' +
          'Se hai ricevuto un <em>link d’invito</em>, aprilo per la prima volta.';
      }
      var testi = {
        state: 'Sessione scaduta, riprova ad aprire il link.',
        validazione: 'Twitch non ha confermato l’accesso, riprova.',
        invito: 'Invito non valido o già usato. Chiedi allo streamer un nuovo link.',
        scaduto: 'L’invito è scaduto. Chiedi allo streamer di reinviartelo.',
        'account-diverso': 'Hai fatto login con un account diverso da quello invitato: usa lo stesso.',
        nonmod: 'Questo account non gestisce nessun canale. Serve un invito dallo streamer.'
      };
      if (errore) {
        var m = document.getElementById('msg');
        m.className = 'msg err';
        m.textContent = testi[errore] || ('Non riuscito: ' + errore);
      }
    })();
  </script>
</body>
</html>
